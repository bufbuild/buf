bans:
  - packages:
      use:
        - ./private/bufpkg/...
        - ./private/pkg/...
        - ./private/gen/...
    deps:
      use:
        - ./private/buf/...
    note: Packages in private/buf cannot be depended on by other packages.
  - packages:
      use:
        - ./private/pkg/...
        - ./private/gen/...
    deps:
      use:
        - ./private/bufpkg/...
    note: Packages in private/bufpkg cannot be depended on by other packages except private/buf packages.
  - packages:
      use:
        - ./...
      except:
        - ./cmd/...
    deps:
      use:
        - ./cmd/...
    note: Packages in cmd should be self-contained.
  - packages:
      use:
        - ./...
      except:
        - ./private/buf/bufcli/...
        - ./cmd/...
    deps:
      use:
        - ./private/buf/bufcli/...
    note: Package bufcli can only be depended on by cmd packages.
  - packages:
      use:
        - ./private/pkg/...
    deps:
      use:
        - ./...
      except:
        - ./private/pkg/...
    note: Packages in private/pkg cannot depend on packages outside of private/pkg.
