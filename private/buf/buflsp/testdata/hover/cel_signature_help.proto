syntax = "proto3";

package test.cel.v1;

import "buf/validate/validate.proto";

message SignatureHelpTest {
  // Global function call: size(this) > 0
  // Expression line (0-indexed): 11.  Cursor at char 22 = 't' of 'this', inside size().
  string test_size = 1 [(buf.validate.field).cel = {
    id: "test.size"
    expression: "size(this) > 0"
  }];

  // Member function call: this.contains('x')
  // Expression line (0-indexed): 18.  Cursor at char 31 = first "'", inside contains().
  string test_member = 2 [(buf.validate.field).cel = {
    id: "test.member"
    expression: "this.contains('x')"
  }];

  // Cursor not inside any call: this != ''
  // Expression line (0-indexed): 25.  Cursor at char 25 = first "'" of '', not in a call.
  string test_no_call = 3 [(buf.validate.field).cel = {
    id: "test.no_call"
    expression: "this != ''"
  }];

  // Nested calls: cursor inside inner string() call.
  // Expression line (0-indexed): 32.  Cursor at char 29 = '4', inside inner string().
  string test_nested = 4 [(buf.validate.field).cel = {
    id: "test.nested"
    expression: "size(string(42)) > 0"
  }];

  // Operator call: (1 + 2) > 0 — the + operator uses the grouping parens, so
  // the cursor appears "inside" a call, but operators must not show signatures.
  // Expression line (0-indexed): 40.  Cursor at char 18 = '1', inside the () group.
  int32 test_operator = 5 [(buf.validate.field).cel = {
    id: "test.operator"
    expression: "(1 + 2) > 0"
  }];

  // Unknown function: not registered in the CEL environment.
  // Expression line (0-indexed): 51.  Cursor at char 27 = 't' of 'this', inside unknown_fn().
  // `    expression: "unknown_fn(this) != ''"`
  //  0         1         2       3
  //  0123456789012345678901234567
  //                  ^17=u      ^27=t
  string test_unknown = 6 [(buf.validate.field).cel = {
    id: "test.unknown"
    expression: "unknown_fn(this) != ''"
  }];

  // Two-argument member call: cursor after first comma → paramIndex 1.
  // Expression line (0-indexed): 58.  Cursor at char 35 = '3', inside substring(1, 3).
  // `    expression: "this.substring(1, 3)"`
  //  0         1         2         3
  //  01234567890123456789012345678901234567
  //                  ^17=t         ^35=3
  string test_substring = 7 [(buf.validate.field).cel = {
    id: "test.substring"
    expression: "this.substring(1, 3)"
  }];

  // Incomplete expression: cursor right after '(' before any arg is typed.
  // The CEL expression "size( " fails to parse as-is; the paren-patching
  // heuristic appends ')' to recover. Expression line (0-indexed): 74.
  // `    expression: "size( "`
  //  0         1         2
  //  01234567890123456789012345
  //                  ^17=s ^21=(  ^22=space (inside incomplete size()
  string test_incomplete = 8 [(buf.validate.field).cel = {
    id: "test.incomplete"
    expression: "size( "
  }];
}
