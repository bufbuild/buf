syntax = "proto3";

package example.v1;

import "types_a.proto";
import "types_b.proto";
import "types_c.proto";
import "types_e.proto";

message MyMessage {
  // Regular field
  TypeA field_a = 1;

  // Map field with custom value type
  map<string, TypeB> map_field = 2;

  // Oneof with custom type
  oneof choice {
    TypeC option_c = 3;
    TypeD option_d = 4;
  }
}

service MyService {
  // RPC with custom request and response types
  rpc MyMethod(TypeE) returns (TypeA);
}
